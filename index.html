<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>25 Motivos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>


<h1>25 Motivos Por Que Eu Te Amo ❤️</h1>

<!-- Tela inicial -->
<div id="intro-screen" class="intro-screen">
    <div class="intro-content">
        <p>Oi, meu bem! 💖<br>
        Aqui você vai descobrir 25 motivos do porquê eu te amo.  
        Clique no botão abaixo para começar a explorar cada motivo!</p>
        <button id="start-btn">OK</button>
    </div>
</div>

<!-- Container dos cards -->
<div id="cards"></div>

<!-- Pop-up final -->
<div id="final-popup" class="popup">
    <div class="popup-content">
        <p>Eu poderia te dizer que te amo… mas resolvi mostrar 25 razões do porquê.</p>
        <button id="close-popup">Fechar</button>
    </div>
</div>

<!-- Corações caindo -->
<div id="hearts-container"></div>

<script src="auto.js"></script>
</body>
</html>
